<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iSRL Logo — Square</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #f7f6f2;
    --ink: #111110;
    --red: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Playfair Display', serif;
  }

  /* Perfect square container */
  .logo-square {
    width: 600px;           /* Change size freely */
    aspect-ratio: 1 / 1;    /* Keeps it perfectly square */
    background: var(--bg);
    display: flex;
    flex-direction: column;
    justify-content: center; /* Vertical centering */
    padding: 4.5rem 3.5rem;  /* Extra breathing room */
  }

  .logo-rule {
    width: 100%;
    height: 2px;
    background: var(--ink);
    margin-bottom: 1.2rem;
  }

  .logo-wordmark {
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }

  .logo-wordmark span {
    font-style: italic; /* lowercase i */
  }

  .logo-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--red);
    margin-top: 0.8rem;
  }
</style>
<link rel="icon" type="image/png" href="/assets/isrl-logo-square.png">
</head>
<body>

<div class="logo-square">
  <div class="logo-rule"></div>
  <div class="logo-wordmark"><span>i</span>SRL</div>
  <div class="logo-sub">Systemic Infrastructure</div>
</div>

</body>
</html>
